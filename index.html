                            <div className="mb-3"><label className="block font-bold text-xs mb-1">項目名稱</label><input type="text" className="w-full border-4 border-black p-2 rounded font-bold" value={editExpenseName} onChange={e => setEditExpenseName(e.target.value)} /></div>
                            <div className="mb-2"><label className="block font-bold text-xs mb-1">日幣金額 ¥</label><input type="number" className="w-full border-4 border-black p-2 rounded font-black text-kuma-red" value={editExpenseJpy} onChange={e => setEditExpenseJpy(e.target.value)} /></div>
                            
                            <label className="block font-bold text-xs mb-1 mt-3 text-gray-700">收據/相片證明 (可選)</label>
                            <div className="mb-5 relative">
                                {expenseUploading && <div className="absolute inset-0 bg-white/80 z-10 flex items-center justify-center font-black text-xs">壓縮上傳中...</div>}
                                {detail.photoUrl ? (
                                    <div className="relative group">
                                        <img src={detail.photoUrl} className="w-full h-32 object-cover rounded border-4 border-black cursor-pointer" onClick={() => setFullScreenPhoto({ url: detail.photoUrl, device: '花費附件' })} />
                                        <button onClick={() => saveItemDetail(editExpenseId, { photoUrl: null })} className="absolute top-2 right-2 bg-kuma-red text-white p-1.5 border-2 border-black rounded shadow-hard"><Icon name="Trash" size={14}/></button>
                                    </div>
                                ) : (
                                    <label className="w-full h-16 border-4 border-dashed border-gray-400 rounded flex flex-col items-center justify-center text-gray-500 font-bold cursor-pointer active:bg-gray-100 transition-colors text-xs">
                                        <Icon name="Camera" size={16} className="mb-1 opacity-50" />
                                        點擊上傳照片
                                        <input type="file" accept="image/*" className="hidden" onChange={handleExpensePhotoUpload} />
                                    </label>
                                )}
                            </div>

                            <button onClick={handleSaveEdit} className="brutal-btn bg-kuma-black text-white w-full py-3 font-black tracking-widest mt-2">儲存修改</button>
                        </div>
                    </div>
                );
            };

            const renderItemDetailModal = () => {
                if (!detailModalItem) return null;
                const detail = itemDetails[detailModalItem.id] || {};

                const handleSaveDetail = () => {
                    saveItemDetail(detailModalItem.id, { notes: tempDetailNotes });
                    if (!detailModalItem.isChecklist && tempDetailTitle !== detailModalItem.title) {
                        const newItin = { ...itinerary };
                        for (let date in newItin) {
                            let idx = newItin[date].findIndex(i => i.id === detailModalItem.id);
                            if (idx !== -1) {
                                newItin[date][idx].title = tempDetailTitle;
                                break;
                            }
                        }
                        saveData(newItin, null, null);
                    }
                    setDetailModalItem(null);
                };

                return (
                    <div className="fixed inset-0 bg-black/60 z-[150] flex flex-col items-center justify-end sm:justify-center p-0 sm:p-4 backdrop-blur-sm">
                        <div className="brutal-card bg-white w-full max-w-md md:max-w-2xl p-5 border-4 sm:border-4 border-b-0 sm:border-b-4 border-black sm:rounded-xl rounded-b-none shadow-hard-lg max-h-[90vh] overflow-y-auto flex flex-col">
                            <div className="flex justify-between items-start mb-4 border-b-4 border-black pb-3">
                                <div className="flex-1 pr-4 w-full">
                                    <span className="text-[10px] font-black bg-yellow-300 px-2 py-0.5 border border-black rounded mb-1 inline-block">{detailModalItem.isChecklist ? '清單項目' : '行程規劃'}</span>
                                    {detailModalItem.isChecklist ? (
                                        <h3 className="font-black text-xl leading-tight text-kuma-black break-words">{detailModalItem.text}</h3>
                                    ) : (
                                        <input 
                                            type="text" 
                                            className="w-full font-black text-xl leading-tight text-kuma-black border-b-2 border-dashed border-gray-400 focus:border-kuma-red outline-none bg-transparent py-1"
                                            value={tempDetailTitle}
                                            onChange={e => setTempDetailTitle(e.target.value)}
                                        />
                                    )}
                                </div>
                                <button onClick={handleSaveDetail} className="p-1"><Icon name="X" /></button>
                            </div>
                            
                            <div className="flex-1 flex flex-col">
                                <label className="block font-black text-sm mb-1 text-gray-700"><Icon name="Pencil" size={14} className="inline mr-1" />詳細備註筆記</label>
                                <textarea 
                                    className="w-full border-4 border-black p-3 rounded font-bold text-sm min-h-[120px] mb-4 focus:ring-4 focus:ring-yellow-300 outline-none resize-none"
                                    placeholder="可以在這裡寫下詳細筆記、價格或網址..."
                                    value={tempDetailNotes}
                                    onChange={e => setTempDetailNotes(e.target.value)}
                                ></textarea>

                                <label className="block font-black text-sm mb-1 text-gray-700"><Icon name="Camera" size={14} className="inline mr-1" />照片證明/參考圖</label>
                                <div className="mb-4 relative">
                                    {detailUploading && <div className="absolute inset-0 bg-white/80 z-10 flex items-center justify-center font-black">壓縮上傳中...</div>}
                                    {detail.photoUrl ? (
                                        <div className="relative group">
                                            <img src={detail.photoUrl} className="w-full h-48 md:h-64 object-cover rounded border-4 border-black cursor-pointer" onClick={() => setFullScreenPhoto({ url: detail.photoUrl, device: '項目附件' })} />
                                            <button onClick={() => saveItemDetail(detailModalItem.id, { photoUrl: null })} className="absolute top-2 right-2 bg-kuma-red text-white p-2 border-2 border-black rounded shadow-hard"><Icon name="Trash" size={16}/></button>
                                        </div>
                                    ) : (
                                        <label className="w-full h-32 border-4 border-dashed border-gray-400 rounded flex flex-col items-center justify-center text-gray-500 font-bold cursor-pointer active:bg-gray-100 transition-colors">
                                            <Icon name="Camera" size={32} className="mb-2 opacity-50" />
                                            點擊上傳一張照片
                                            <input type="file" accept="image/*" className="hidden" onChange={handleDetailPhotoUpload} />
                                        </label>
                                    )}
                                </div>
                            </div>

                            {/* ✅ 在編輯頁面底部加入明顯的紅色垃圾桶刪除按鈕 */}
                            <div className="flex space-x-3 mt-auto pt-4">
                                {!detailModalItem.isChecklist && (
                                    <button 
                                        onClick={() => {
                                            deleteItinerary(activeDate, detailModalItem.id);
                                            setDetailModalItem(null);
                                        }} 
                                        className="brutal-btn bg-kuma-red text-white px-5 flex items-center justify-center shadow-hard-lg active:scale-95 transition-transform"
                                    >
                                        <Icon name="Trash" size={24} />
                                    </button>
                                )}
                                <button onClick={handleSaveDetail} className="brutal-btn bg-kuma-black text-white flex-1 py-4 font-black tracking-widest text-lg shadow-hard-lg active:scale-95 transition-transform">儲存並返回</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="relative min-h-screen bg-neo-grid w-full max-w-md md:max-w-2xl lg:max-w-4xl mx-auto shadow-2xl overflow-hidden flex flex-col text-kuma-black">
                    {view === 'home' && renderHomeView()}
                    {view === 'itinerary' && renderItineraryView()}
                    {view === 'calc' && renderCalculatorView()}
                    {view === 'checklist' && renderChecklistView()}
                    {view === 'photos' && renderPhotoGalleryView()}
                    {view === 'map' && renderMapView()}

                    {/* ✅ 懸浮新增按鈕 - 自適應寬度 */}
                    {(view === 'itinerary' || view === 'checklist') && (
                        <div className="fixed bottom-6 left-0 right-0 w-full max-w-md md:max-w-2xl lg:max-w-4xl mx-auto px-4 z-[90] pointer-events-none flex justify-center">
                            <button onClick={() => setShowAddModal(true)} className="brutal-btn bg-kuma-red text-white w-full max-w-[220px] py-3.5 flex items-center justify-center space-x-2 pointer-events-auto text-lg shadow-hard-lg">
                                <Icon name="Plus" size={24} /><span>新增{view === 'itinerary' ? '行程' : '項目'}</span>
                            </button>
                        </div>
                    )}

                    {/* ✅ 修正：移除 lg:right-auto 讓它在所有設備上都乖乖待在右下角 */}
                    {view !== 'calc' && view !== 'photos' && view !== 'map' && (
                        <button onClick={() => { setGlobalCalcJpy(''); setShowGlobalCalc(true); }} className="fixed bottom-[100px] right-4 md:right-8 z-[90] brutal-btn bg-yellow-400 p-4 rounded-full shadow-hard-red flex items-center justify-center active:translate-y-1 transition-transform"><Icon name="Calculator" size={28} /></button>
                    )}

                    {/* Modals & Overlays */}
                    {renderAddItemModal()}
                    {renderEditExpenseModal()}
                    {renderItemDetailModal()}

                    {/* ✅ 全螢幕照片檢視器 - 支援原生拖曳與縮放 */}
                    {fullScreenPhoto && (
                        <div className="fixed inset-0 bg-black z-[200] flex flex-col items-center justify-center p-0 overflow-hidden" onClick={() => setFullScreenPhoto(null)}>
                            <div className="absolute top-6 right-4 text-white p-2 cursor-pointer z-[210] bg-black/50 rounded-full" onClick={() => setFullScreenPhoto(null)}><Icon name="X" size={28} /></div>
                            
                            {/* 允許圖片容器進行原生縮放，需要 overflow-auto 配合 */}
                            <div className="w-full h-full flex items-center justify-center overflow-auto">
                                <img src={fullScreenPhoto.url} className="max-w-none w-full object-contain pointer-events-auto transition-transform" onClick={(e) => e.stopPropagation()} />
                            </div>

                            <div className="absolute bottom-6 left-0 right-0 px-4 pointer-events-none z-[210]">
                                <div className="bg-black/70 backdrop-blur-md rounded-xl p-4 text-center text-white border border-white/20 shadow-xl pointer-events-auto mx-auto max-w-sm">
                                    <p className="font-black text-lg mb-1">{fullScreenPhoto.device || '未知設備'}</p>
                                    
                                    {/* Map overlay skip extra info to keep it clean */}
                                    {!fullScreenPhoto.isMap && (
                                        <>
                                            {fullScreenPhoto.cameraInfo && <p className="text-xs text-gray-300 mb-1">{fullScreenPhoto.cameraInfo}</p>}
                                            {fullScreenPhoto.captureTime && <p className="font-bold opacity-80 text-xs mb-3">{new Date(fullScreenPhoto.captureTime).toLocaleString()}</p>}
                                            
                                            {/* 結合經緯度提供 Google Maps 導航 */}
                                            {fullScreenPhoto.lat && fullScreenPhoto.lon && (
                                                <a href={`https://www.google.com/maps/search/?api=1&query=${fullScreenPhoto.lat},${fullScreenPhoto.lon}`} target="_blank" rel="noreferrer" className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-full text-xs font-black inline-flex items-center transition-colors shadow-md mt-2">
                                                    <Icon name="Map" size={14} className="mr-1.5" /> 在地圖上查看位置
                                                </a>
                                            )}
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 開發者模式彩蛋 */}
                    {showDevModal && (
                        <div className="fixed inset-0 bg-black/60 z-[250] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setShowDevModal(false)}>
                            <div className="brutal-card bg-white w-full max-w-xs p-6 border-4 border-black text-center animate-pop" onClick={e => e.stopPropagation()}>
                                <h3 className="font-black text-xl mb-2 text-kuma-black">您已經啟用開發者模式</h3>
                                <p className="font-bold text-gray-600 mb-6 text-sm">但開發者正在休息，請您稍後片刻。</p>
                                <button onClick={() => setShowDevModal(false)} className="w-full brutal-btn bg-yellow-400 text-kuma-black py-3 font-black">我知道了</button>
                            </div>
                        </div>
                    )}

                    {/* 防呆刪除警告 */}
                    {photoToDelete && (
                        <div className="fixed inset-0 bg-black/60 z-[250] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="brutal-card bg-white w-full max-w-xs p-6 border-4 border-black text-center">
                                <h3 className="font-black text-xl mb-2 text-kuma-red">溫馨提醒</h3>
                                <p className="font-bold text-gray-600 mb-6 text-sm">刪除後將無法復原這張珍貴的旅行回憶喔！確定要刪除嗎？</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setPhotoToDelete(null)} className="flex-1 brutal-btn bg-gray-200 py-3 font-black">取消</button>
                                    <button onClick={async () => { await window.firebaseModules.deleteDoc(window.firebaseModules.doc(db, 'artifacts', tripId, 'public', 'data', 'photos', photoToDelete)); setPhotoToDelete(null); }} className="flex-1 brutal-btn bg-kuma-red text-white py-3 font-black text-center">刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGlobalCalc && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="brutal-card bg-kuma-red w-full max-w-sm p-1 shadow-hard-lg">
                                <div className="bg-white rounded-lg p-5">
                                    <div className="flex justify-between items-center mb-4"><h3 className="font-black text-xl text-kuma-black">快速匯率換算</h3><button onClick={() => setShowGlobalCalc(false)}><Icon name="X" /></button></div>
                                    <input type="number" placeholder="輸入日幣..." className="w-full border-4 border-black p-3 rounded font-black text-2xl mb-4 focus:outline-none" value={globalCalcJpy} onChange={(e) => setGlobalCalcJpy(e.target.value)} autoFocus />
                                    <div className="bg-gray-100 p-4 rounded border-2 border-black">
                                        <p className="font-bold text-gray-600 mb-1 text-sm text-left">約合台幣 (x{JPY_RATE})</p><p className="font-black text-4xl text-kuma-black text-right">NT$ {Math.round(parseInt(globalCalcJpy || 0)*JPY_RATE).toLocaleString()}</p>
                                    </div>
                                    <button className="brutal-btn bg-kuma-black text-white w-full py-3 mt-4 text-lg font-black tracking-widest text-center" onClick={() => setShowGlobalCalc(false)}>完成</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
