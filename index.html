                                    const detailedName = [...new Set(parts)].join(' ');
                                    if (detailedName) {
                                        locationStr = detailedName;
                                    }
                                }
                            } catch (geoErr) {
                                console.log('Geocoding error:', geoErr);
                            }
                        } catch(e){}
                    }

                    const cleanStr = (str) => str ? String(str).replace(/[\x00-\x1F\x7F-\x9F\uFFFD]/g, '').trim() : '';
                    let cleanModel = cleanStr(exifData.Model);

                    let cameraInfo = [];
                    if (cleanModel) cameraInfo.push(cleanModel);
                    if (exifData.FNumber) cameraInfo.push(`f/${exifData.FNumber}`);
                    if (exifData.ExposureTime) cameraInfo.push(`1/${Math.round(1/exifData.ExposureTime)}s`);
                    if (exifData.ISOSpeedRatings) cameraInfo.push(`ISO${exifData.ISOSpeedRatings}`);

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = async () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 1000;
                            let w = img.width, h = img.height;
                            if (w > MAX_SIZE || h > MAX_SIZE) {
                                if (w > h) { h *= MAX_SIZE / w; w = MAX_SIZE; }
                                else { w *= MAX_SIZE / h; h = MAX_SIZE; }
                            }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                            const cTimeStr = exifData.DateTimeOriginal || exifData.DateTime;
                            let cTS = Date.now();

                            }

                                captureTime: cTS, 
                                device: cleanModel || '未知設備', 
                                cameraInfo: cameraInfo.join(' • '), 
                                location: locationStr, 
                                lat: latForMap, 
                                lon: lonForMap
                            });
                            setIsUploading(false);
                        };
                        img.src = event.target.result;

                    reader.readAsDataURL(file);

                if (edgeSwipe.startX !== null && edgeSwipe.currentX !== null) {
                    const dx = edgeSwipe.currentX - edgeSwipe.startX;
                    const dy = Math.abs(edgeSwipe.currentY - edgeSwipe.startY);

                const isRightSwipe = distanceX < -60;

                                    <div className="w-full pt-[100%] relative shrink-0">

                                    </div>

                                            {p.cameraInfo && <p className="text-[9px] font-bold text-gray-500 truncate mt-0.5" title={p.cameraInfo}>{p.cameraInfo}</p>}

                                    <button onClick={(e) => { e.stopPropagation(); setPhotoToDelete(p.id); }} className="absolute top-2 right-2 bg-kuma-red text-white p-1.5 rounded border-2 border-black active:translate-y-0.5 transition-all"><Icon name="Trash" size={14} /></button>

                        {photos.length === 0 && <div className="text-center py-20 font-bold text-gray-400">目前尚無上傳照片</div>}

                    {isUploading && <div className="fixed inset-0 bg-black/60 z-[100] flex flex-col items-center justify-center text-white font-black"><Icon name="Camera" size={40} className="animate-bounce mb-2" /><p>照片解析同步中...</p></div>}

                            <Icon name="Camera" size={24} /><span className="font-black">快速上傳相片</span><input type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload} />
                        </label>
                    </div>
                </div>
            );

            const renderMapView = () => {
                const activeMapUrl = tripMaps[activeMapId] || ""; 
                return (
                    <div className="flex flex-col h-screen bg-neo-grid text-kuma-black">
                        <div className="bg-kuma-black text-white safe-top-bar flex items-center shadow-md z-20 shrink-0"><button onClick={() => setView('home')} className="mr-4 active:scale-90 transition-transform"><Icon name="ArrowLeft" /></button><h2 className="font-black text-xl text-white text-center flex-1 pr-8">旅程地圖</h2></div>
                        <div className="bg-white border-b-4 border-black flex overflow-x-auto hide-scrollbar sticky top-[60px] z-10 shrink-0">
                            {mapSteps.map(m => (<button key={m.id} onClick={() => setActiveMapId(m.id)} className={`flex-1 min-w-[55px] py-4 font-black border-r-4 border-black last:border-r-0 transition-all ${activeMapId === m.id ? 'bg-green-500 text-white shadow-inner' : 'text-kuma-black hover:bg-green-50'}`}>{m.title}</button>))}
                        </div>
                        
                        <div className="flex-1 overflow-auto p-0 pb-24 bg-gray-200">
                            {activeMapUrl ? (
                                <img src={activeMapUrl} className="max-w-none w-full object-contain pointer-events-auto" alt="map" onClick={() => setFullScreenPhoto({ url: activeMapUrl, device: `${mapSteps.find(m => m.id === activeMapId).title} 規劃圖`, isMap: true })} />
                            ) : (
                                <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 p-8 text-center bg-white">
                                    <Icon name="Map" size={48} className="mb-2 opacity-20" />
                                    <p className="font-black text-sm">尚未上傳此頁插畫圖</p>
                                </div>
                            )}
                        </div>
                        
                        <div className="fixed bottom-6 left-0 right-0 w-full px-8 pointer-events-none flex flex-col items-center safe-bottom-float">
                             <label className="brutal-btn bg-white text-kuma-black px-6 py-3 mb-3 flex items-center space-x-2 shadow-hard border-2 border-black active:scale-95 transition-all cursor-pointer pointer-events-auto">
                                <Icon name="Pencil" size={18} /><span className="font-black">更新此頁地圖圖檔</span>
                                <input type="file" accept="image/*" className="hidden" onChange={handleMapUpload} />
                            </label>
                            <div className="bg-kuma-black text-white px-4 py-2 rounded-lg border-2 border-white shadow-hard text-center font-black text-sm pointer-events-auto">📍 目前查看：{mapSteps.find(m => m.id === activeMapId).title} 規劃圖</div>
                        </div>
                    </div>
                );
            };

            const renderAddItemModal = () => {
                if (!showAddModal) return null;
                const handleSave = () => {
                    if (!modalTitle) return;
                    if (view === 'itinerary') {
                        const newItem = { id: `itin_${Date.now()}`, time: modalTime, title: modalTitle, desc: modalDesc, type: 'location' };
                        const newItin = { ...itinerary };
                        if (!newItin[activeDate]) newItin[activeDate] = [];
                        newItin[activeDate] = [...newItin[activeDate], newItem].sort((a, b) => a.time.localeCompare(b.time));
                        saveData(newItin, null, null);
                    } else if (view === 'checklist') {
                        const newItem = { id: `chk_${Date.now()}`, text: modalTitle, done: false, owner: activeChecklistTab === 'personal' ? modalOwner : null };
                        const nc = { ...checklist };
                        nc[activeChecklistTab] = [...(nc[activeChecklistTab] || []), newItem];
                        saveData(null, nc, null);
                    }
                    setModalTitle(''); setModalDesc(''); setShowAddModal(false);
                };
                return (
                    <div className="fixed inset-0 bg-black/60 z-[120] flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="modal-card bg-white w-full max-w-sm p-5 border-4 border-black shadow-hard-lg">
                            <div className="flex justify-between items-center mb-4"><h3 className="font-black text-xl">新增至{view === 'itinerary' ? activeDate.split('-').slice(1).join('/') : '項目'}</h3><button onClick={() => setShowAddModal(false)}><Icon name="X" /></button></div>
                            
                            {view === 'checklist' && activeChecklistTab === 'personal' && (
                                <div className="mb-4">
                                    <label className="block font-bold text-xs mb-2">購買人標籤</label>
                                    <div className="flex space-x-3">
                                        <button onClick={() => setModalOwner('Jeremy')} className={`flex-1 py-2 font-black border-2 border-black rounded ${modalOwner === 'Jeremy' ? 'bg-blue-300 shadow-inner' : 'bg-white'}`}>Jeremy</button>
                                        <button onClick={() => setModalOwner('Jimmy')} className={`flex-1 py-2 font-black border-2 border-black rounded ${modalOwner === 'Jimmy' ? 'bg-orange-300 shadow-inner' : 'bg-white'}`}>Jimmy</button>
                                    </div>
                                </div>
                            )}

                            {view === 'itinerary' && (
                                <div className="mb-3"><label className="block font-bold text-xs mb-1">時間</label><input type="time" className="w-full border-4 border-black p-2 rounded font-bold" value={modalTime} onChange={e => setModalTime(e.target.value)} /></div>
                            )}
                            <div className="mb-3"><label className="block font-bold text-xs mb-1">{view === 'itinerary' ? '行程名稱' : '清單名稱'}</label><input type="text" className="w-full border-4 border-black p-2 rounded font-bold" value={modalTitle} onChange={e => setModalTitle(e.target.value)} placeholder="輸入名稱..." autoFocus /></div>
                            {view === 'itinerary' && (
                                <div className="mb-4"><label className="block font-bold text-xs mb-1">備註/地點</label><input type="text" className="w-full border-4 border-black p-2 rounded font-bold" value={modalDesc} onChange={e => setModalDesc(e.target.value)} placeholder="輸入簡短備註..." /></div>
                            )}
                            <button onClick={handleSave} className="brutal-btn bg-kuma-red text-white w-full py-3 font-black tracking-widest">儲存</button>
                        </div>
                    </div>
                );
            };

            const renderEditExpenseModal = () => {
                if (!showEditExpenseModal) return null;
                const detail = itemDetails[editExpenseId] || {}; 

                const handleSaveEdit = () => {
                    const newTS = new Date(editExpenseTime).getTime();
                    const upExp = expenses.map(e => (e.id === editExpenseId ? {
                        ...e, name: editExpenseName || '未命名花費', 
                        jpy: parseInt(editExpenseJpy), 
                        twd: Math.round(parseInt(editExpenseJpy) * JPY_RATE),
                        timestamp: newTS,
                        date: new Date(newTS).toLocaleDateString('zh-TW', {month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'})
                    } : e));
                    saveData(null, null, upExp);
                    setShowEditExpenseModal(false);
                };
                return (
                    <div className="fixed inset-0 bg-black/60 z-[150] flex items-center justify-center p-4 backdrop-blur-sm text-kuma-black">
                        <div className="modal-card bg-white w-full max-w-sm p-5 border-4 border-black shadow-hard-lg max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-4"><h3 className="font-black text-xl">編輯花費</h3><button onClick={() => setShowEditExpenseModal(false)}><Icon name="X" /></button></div>
                            <div className="mb-3 text-left"><label className="block font-bold text-xs mb-1">發生時間</label><input type="datetime-local" className="w-full border-4 border-black p-2 rounded font-bold" value={editExpenseTime} onChange={e => setEditExpenseTime(e.target.value)} /></div>
                            <div className="mb-3 text-left"><label className="block font-bold text-xs mb-1">項目名稱</label><input type="text" className="w-full border-4 border-black p-2 rounded font-bold" value={editExpenseName} onChange={e => setEditExpenseName(e.target.value)} /></div>
                            <div className="mb-4 text-left"><label className="block font-bold text-xs mb-1">日幣金額 ¥</label><input type="number" className="w-full border-4 border-black p-2 rounded font-black text-kuma-red text-xl" value={editExpenseJpy} onChange={e => setEditExpenseJpy(e.target.value)} /></div>
                            
                            <label className="block font-bold text-xs mb-1 text-gray-700 text-left">收據/相片證明 (可選)</label>
                            <div className="mb-5 relative">
                                {expenseUploading && <div className="absolute inset-0 bg-white/80 z-10 flex items-center justify-center font-black text-xs">上傳中...</div>}
                                {detail.photoUrl ? (
                                    <div className="relative group">
                                        <img src={detail.photoUrl} className="w-full h-32 object-cover rounded border-4 border-black cursor-pointer" onClick={() => setFullScreenPhoto({ url: detail.photoUrl, device: '花費附件' })} />
                                        <button onClick={() => saveItemDetail(editExpenseId, { photoUrl: null })} className="absolute top-2 right-2 bg-kuma-red text-white p-1.5 border-2 border-black rounded shadow-hard"><Icon name="Trash" size={14}/></button>
                                    </div>
                                ) : (
                                    <label className="w-full h-16 border-4 border-dashed border-gray-400 rounded flex flex-col items-center justify-center text-gray-500 font-bold cursor-pointer active:bg-gray-100 transition-colors text-xs">
                                        <Icon name="Camera" size={16} className="mb-1 opacity-50" />
                                        點擊上傳照片
                                        <input type="file" accept="image/*" className="hidden" onChange={handleExpensePhotoUpload} />
                                    </label>
                                )}
                            </div>

                            <button onClick={handleSaveEdit} className="brutal-btn bg-kuma-black text-white w-full py-3 font-black tracking-widest mt-2 shadow-hard">儲存修改</button>
                        </div>
                    </div>
                );
            };

            const renderItemDetailModal = () => {
                if (!detailModalItem) return null;
                const urls = getItemPhotos(detailModalItem.id);

                const handleSaveDetail = () => {
                    saveItemDetail(detailModalItem.id, { notes: tempDetailNotes });
                    
                    if (!detailModalItem.isChecklist && (tempDetailTitle !== detailModalItem.title || tempDetailDesc !== detailModalItem.desc || tempDetailTime !== detailModalItem.time)) {
                        const newItin = {};
                        for(let key in itinerary) newItin[key] = [...itinerary[key]];
                        
                        for (let date in newItin) {
                            let idx = newItin[date].findIndex(i => i.id === detailModalItem.id);
                            if (idx !== -1) {
                                newItin[date][idx] = { ...newItin[date][idx], title: tempDetailTitle, desc: tempDetailDesc, time: tempDetailTime };
                                newItin[date].sort((a, b) => a.time.localeCompare(b.time));
                                break;
                            }
                        }
                        saveData(newItin, null, null);
                    } else if (detailModalItem.isChecklist && tempDetailTitle !== detailModalItem.text) {
                        const newChecklist = { 
                            luggage: [...(checklist.luggage || [])], 
                            souvenir: [...(checklist.souvenir || [])], 
                            personal: [...(checklist.personal || [])] 
                        };
                        for (let type in newChecklist) {
                            let idx = newChecklist[type].findIndex(i => i.id === detailModalItem.id);
                            if (idx !== -1) {
                                newChecklist[type][idx] = { ...newChecklist[type][idx], text: tempDetailTitle };
                                break;
                            }
                        }
                        saveData(null, newChecklist, null);
                    }
                    
                    setDetailModalItem(null);
                };

                return (
                    <div className="fixed inset-0 bg-black/60 z-[150] flex flex-col items-center justify-end sm:justify-center p-0 sm:p-4 backdrop-blur-sm text-kuma-black">
                        <div className="modal-card bg-white w-full max-w-md md:max-w-2xl p-5 border-4 sm:border-4 border-b-0 sm:border-b-4 border-black sm:rounded-xl rounded-b-none shadow-hard-lg max-h-[90vh] overflow-y-auto flex flex-col">
                            <div className="flex justify-between items-start mb-4 border-b-4 border-black pb-3">
                                <div className="flex-1 pr-4 w-full">
                                    <span className="text-[10px] font-black bg-yellow-300 px-2 py-0.5 border border-black rounded mb-1 inline-block text-left">{detailModalItem.isChecklist ? '清單項目' : '行程規劃'}</span>
                                    <input 
                                        type="text" 
                                        className="w-full font-black text-xl leading-tight border-b-2 border-dashed border-gray-400 focus:border-kuma-red outline-none bg-transparent py-1"
                                        value={tempDetailTitle}
                                        onChange={e => setTempDetailTitle(e.target.value)}
                                        placeholder="項目名稱"
                                    />
                                </div>
                                <button onClick={handleSaveDetail} className="p-1"><Icon name="X" /></button>
                            </div>
                            
                            <div className="flex-1 flex flex-col">
                                {!detailModalItem.isChecklist && (
                                    <div className="mb-4 flex space-x-3">
                                        <div className="w-[120px] shrink-0">
                                            <label className="block font-black text-sm mb-1 text-gray-700 text-left">
                                                時間
                                            </label>
                                            <input 
                                                type="time" 
                                                className="w-full border-4 border-black p-2 rounded font-bold text-sm focus:ring-4 focus:ring-yellow-300 outline-none bg-white text-center"
                                                value={tempDetailTime}
                                                onChange={e => setTempDetailTime(e.target.value)}
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="block font-black text-sm mb-1 text-gray-700 text-left">
                                                <Icon name="Map" size={14} className="inline mr-1" />小標題提醒
                                            </label>
                                            <input 
                                                type="text" 
                                                className="w-full border-4 border-black p-2 rounded font-bold text-sm focus:ring-4 focus:ring-yellow-300 outline-none bg-white"
                                                placeholder="例如: 轉乘資訊、集合地點..."
                                                value={tempDetailDesc}
                                                onChange={e => setTempDetailDesc(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                )}

                                <label className="block font-black text-sm mb-1 text-gray-700 text-left"><Icon name="Pencil" size={14} className="inline mr-1" />詳細備註筆記</label>
                                <textarea 
                                    className="w-full border-4 border-black p-3 rounded font-bold text-sm min-h-[100px] mb-4 focus:ring-4 focus:ring-yellow-300 outline-none resize-none"
                                    placeholder="詳細筆記、價格或網址..."
                                    value={tempDetailNotes}
                                    onChange={e => setTempDetailNotes(e.target.value)}
                                ></textarea>

                                <label className="block font-black text-sm mb-1 text-gray-700 text-left"><Icon name="Camera" size={14} className="inline mr-1" />照片證明/參考圖 (最多 3 張)</label>
                                <div className="mb-4 flex space-x-3 overflow-x-auto hide-scrollbar pb-2">
                                    {detailUploading && <div className="shrink-0 w-28 h-28 border-4 border-dashed border-gray-300 flex items-center justify-center font-black text-sm text-gray-400">上傳中...</div>}
                                    
                                    {urls.map((u, i) => (
                                        <div key={i} className="relative group shrink-0 w-28 h-28">
                                            <img src={u} className="w-full h-full object-cover rounded border-4 border-black cursor-pointer shadow-hard" onClick={() => setFullScreenPhoto({ type: 'multi', urls, currentIndex: i, device: '項目附件' })} />
                                            <button onClick={() => handleRemoveDetailPhoto(i)} className="absolute top-1 right-1 bg-kuma-red text-white p-1 border-2 border-black rounded shadow-hard"><Icon name="Trash" size={14}/></button>
                                        </div>
                                    ))}
                                    
                                    {urls.length < 3 && !detailUploading && (
                                        <label className="shrink-0 w-28 h-28 border-4 border-dashed border-gray-400 rounded flex flex-col items-center justify-center text-gray-500 font-bold cursor-pointer active:bg-gray-100 transition-colors">
                                            <Icon name="Camera" size={24} className="mb-1 opacity-50" />
                                            <span className="text-xs">新增圖片</span>
                                            <input type="file" accept="image/*" className="hidden" onChange={handleDetailPhotoUpload} />
                                        </label>
                                    )}
                                </div>
                            </div>

                            <div className="flex space-x-3 mt-auto pt-2">
                                {!detailModalItem.isChecklist && (
                                    <button 
                                        onClick={() => {
                                            deleteItinerary(activeDate, detailModalItem.id);
                                            setDetailModalItem(null);
                                        }} 
                                        className="brutal-btn bg-kuma-red text-white px-5 flex items-center justify-center shadow-hard-lg active:scale-95 transition-transform"
                                    >
                                        <Icon name="Trash" size={24} />
                                    </button>
                                )}
                                <button onClick={handleSaveDetail} className="brutal-btn bg-kuma-black text-white flex-1 py-4 font-black tracking-widest text-lg shadow-hard-lg active:scale-95 transition-transform text-center">儲存並返回</button>
                            </div>
                        </div>
                    </div>
                );
            };

            if (appSettings?.isPinEnabled && !isAuthenticated) {
                return renderPinScreen();
            }

            return (
                <div 
                    className="relative min-h-screen bg-neo-grid w-full max-w-md md:max-w-2xl lg:max-w-4xl mx-auto shadow-2xl overflow-hidden flex flex-col text-kuma-black"
                    onTouchStart={handleAppTouchStart}
                    onTouchMove={handleAppTouchMove}
                    onTouchEnd={handleAppTouchEnd}
                >
                    {view === 'home' && renderHomeView()}
                    {view === 'itinerary' && renderItineraryView()}
                    {view === 'calc' && renderCalculatorView()}
                    {view === 'checklist' && renderChecklistView()}
                    {view === 'photos' && renderPhotoGalleryView()}
                    {view === 'map' && renderMapView()}
                    {view === 'settings' && renderSettingsView()}
                    {view === 'weather' && renderWeatherView()}

                    {(view === 'itinerary' || view === 'checklist') && (
                        <div className="fixed left-0 right-0 w-full max-w-md md:max-w-2xl lg:max-w-4xl mx-auto px-4 z-[90] pointer-events-none flex justify-center safe-bottom-float">
                            <button onClick={() => setShowAddModal(true)} className="brutal-btn bg-kuma-red text-white w-full max-w-[220px] py-3.5 flex items-center justify-center space-x-2 pointer-events-auto text-lg shadow-hard-lg">
                                <Icon name="Plus" size={24} /><span>新增{view === 'itinerary' ? '行程' : '項目'}</span>
                            </button>
                        </div>
                    )}

                    {view !== 'calc' && view !== 'photos' && view !== 'map' && view !== 'settings' && view !== 'weather' && (
                        <button onClick={() => { 
                            setGlobalCalcJpy(''); 
                            setShowGlobalCalc(true); 
                        }} className="fixed right-4 md:right-8 z-[90] brutal-btn bg-yellow-400 p-4 rounded-full shadow-hard-red flex items-center justify-center active:translate-y-1 transition-all safe-bottom-calc"><Icon name="Calculator" size={28} /></button>
                    )}

                    {renderAddItemModal()}
                    {renderEditExpenseModal()}
                    {renderItemDetailModal()}

                    {fullScreenPhoto && (() => {
                        const isGalleryPhoto = fullScreenPhoto.id && photos.some(p => p.id === fullScreenPhoto.id);
                        const isMultiPhoto = fullScreenPhoto.type === 'multi';
                        
                        let currentIndex = -1;
                        let maxIndex = 0;
                        let imgSrc = '';

                        if (isGalleryPhoto) {
                            currentIndex = photos.findIndex(p => p.id === fullScreenPhoto.id);
                            maxIndex = photos.length - 1;
                            imgSrc = fullScreenPhoto.url;
                        } else if (isMultiPhoto) {
                            currentIndex = fullScreenPhoto.currentIndex;
                            maxIndex = fullScreenPhoto.urls.length - 1;
                            imgSrc = fullScreenPhoto.urls[currentIndex];
                        } else {
                            imgSrc = fullScreenPhoto.url;
                        }

                        const handlePrev = (e) => { 
                            e.stopPropagation(); 
                            if(isGalleryPhoto && currentIndex > 0) setFullScreenPhoto(photos[currentIndex - 1]); 
                            if(isMultiPhoto && currentIndex > 0) setFullScreenPhoto({...fullScreenPhoto, currentIndex: currentIndex - 1});
                        };
                        const handleNext = (e) => { 
                            e.stopPropagation(); 
                            if(isGalleryPhoto && currentIndex < maxIndex) setFullScreenPhoto(photos[currentIndex + 1]); 
                            if(isMultiPhoto && currentIndex < maxIndex) setFullScreenPhoto({...fullScreenPhoto, currentIndex: currentIndex + 1});
                        };

                        return (
                            <div className="fixed inset-0 bg-black z-[200] flex flex-col items-center justify-center p-0 overflow-hidden" 
                                 onClick={() => setShowPhotoUI(!showPhotoUI)}
                                 onTouchStart={onTouchStart}
                                 onTouchMove={onTouchMove}
                                 onTouchEnd={onTouchEndEvent}>
                                 
                                <div className="w-full h-full flex items-center justify-center overflow-auto">
                                    <img src={imgSrc} className="max-w-none w-full object-contain pointer-events-auto transition-transform" onClick={(e) => e.stopPropagation()} />
                                </div>

                                <div className={`absolute inset-0 pointer-events-none transition-opacity duration-300 ${showPhotoUI ? 'opacity-100' : 'opacity-0'}`}>
                                    <div className="absolute top-2 sm:top-4 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-white/50 rounded-full"></div>
                                    
                                    {isMultiPhoto && maxIndex > 0 && (
                                        <div className="absolute top-4 left-4 bg-black/60 text-white px-3 py-1 rounded-full font-black text-sm">{currentIndex + 1} / {maxIndex + 1}</div>
                                    )}

                                    <div className="absolute right-4 text-white p-2 cursor-pointer z-[210] bg-black/50 rounded-full pointer-events-auto safe-close-btn" onClick={(e) => { e.stopPropagation(); setFullScreenPhoto(null); }}><Icon name="X" size={28} /></div>
                                    
                                    {(isGalleryPhoto || isMultiPhoto) && currentIndex > 0 && (
                                        <div className="absolute left-2 sm:left-4 top-1/2 -translate-y-1/2 text-white p-2 sm:p-3 cursor-pointer pointer-events-auto bg-black/50 rounded-full hover:bg-black/70" onClick={handlePrev}>
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                                        </div>
                                    )}
                                    {(isGalleryPhoto || isMultiPhoto) && currentIndex < maxIndex && (
                                        <div className="absolute right-2 sm:right-4 top-1/2 -translate-y-1/2 text-white p-2 sm:p-3 cursor-pointer pointer-events-auto bg-black/50 rounded-full hover:bg-black/70" onClick={handleNext}>
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                        </div>
                                    )}

                                    <div className="absolute left-0 right-0 px-4 pointer-events-none z-[210] safe-bottom-float">
                                        <div className="bg-black/70 backdrop-blur-md rounded-xl p-4 text-center text-white border border-white/20 shadow-xl pointer-events-auto mx-auto max-w-sm">
                                            {fullScreenPhoto.location && !fullScreenPhoto.location.includes('.') && (
                                                <p className="text-sm text-yellow-300 font-black mb-1.5 tracking-wide flex items-center justify-center">
                                                    <Icon name="Map" size={14} className="mr-1" />{fullScreenPhoto.location}
                                                </p>
                                            )}
                                            <p className="font-black text-lg mb-1">{fullScreenPhoto.device || '未知設備'}</p>
                                            
                                            {!fullScreenPhoto.isMap && !isMultiPhoto && (
                                                <>
                                                    {fullScreenPhoto.cameraInfo && <p className="text-xs text-gray-300 mb-1">{fullScreenPhoto.cameraInfo}</p>}
                                                    {fullScreenPhoto.captureTime && <p className="font-bold opacity-80 text-xs mb-3">{new Date(fullScreenPhoto.captureTime).toLocaleString()}</p>}
                                                    
                                                    {fullScreenPhoto.lat && fullScreenPhoto.lon && (
                                                        <a href={`https://www.google.com/maps/search/?api=1&query=${fullScreenPhoto.lat},${fullScreenPhoto.lon}`} target="_blank" rel="noreferrer" className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-full text-xs font-black inline-flex items-center transition-colors shadow-md mt-2 shadow-hard">
                                                            <Icon name="Map" size={14} className="mr-1.5" /> 在地圖上查看位置
                                                        </a>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {checklistToDelete && (
                        <div className="fixed inset-0 bg-black/60 z-[250] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="modal-card bg-white w-full max-w-xs p-6 border-4 border-black text-center animate-pop">
                                <h3 className="font-black text-xl mb-2 text-kuma-red text-center">溫馨提醒</h3>
                                <p className="font-bold text-gray-600 mb-6 text-sm text-center">確定要刪除這個項目嗎？</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setChecklistToDelete(null)} className="flex-1 brutal-btn bg-gray-200 py-3 font-black shadow-hard text-center">取消</button>
                                    <button onClick={() => { deleteChecklist(checklistToDelete.type, checklistToDelete.id); setChecklistToDelete(null); }} className="flex-1 brutal-btn bg-kuma-red text-white py-3 font-black text-center shadow-hard text-center">刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {photoToDelete && (
                        <div className="fixed inset-0 bg-black/60 z-[250] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="modal-card bg-white w-full max-w-xs p-6 border-4 border-black text-center animate-pop">
                                <h3 className="font-black text-xl mb-2 text-kuma-red text-center">溫馨提醒</h3>
                                <p className="font-bold text-gray-600 mb-6 text-sm text-center">刪除後將無法復原這張珍貴的旅行回憶喔！確定要刪除嗎？</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setPhotoToDelete(null)} className="flex-1 brutal-btn bg-gray-200 py-3 font-black shadow-hard text-center">取消</button>
                                    <button onClick={async () => { await window.firebaseModules.deleteDoc(window.firebaseModules.doc(db, 'artifacts', tripId, 'public', 'data', 'photos', photoToDelete)); setPhotoToDelete(null); }} className="flex-1 brutal-btn bg-kuma-red text-white py-3 font-black text-center shadow-hard text-center">刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGlobalCalc && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex flex-col justify-end sm:justify-center items-center p-0 sm:p-4 backdrop-blur-sm" onClick={() => setShowGlobalCalc(false)}>
                            <div className="modal-card bg-kuma-red w-full max-w-md p-1 shadow-hard-lg rounded-b-none sm:rounded-xl" onClick={(e) => e.stopPropagation()}>
                                <div className="bg-white rounded-lg p-5">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-black text-xl text-kuma-black">快速匯率換算</h3>
                                        <button onClick={() => setShowGlobalCalc(false)} className="bg-gray-100 p-1.5 rounded-full border-2 border-black active:scale-90 transition-transform"><Icon name="X" size={20} /></button>
                                    </div>
                                    
                                    <div className="bg-gray-100 p-4 rounded border-2 border-black mb-4">
                                        <div className="text-right text-4xl font-black text-kuma-red break-all tracking-wider mb-2">¥ {parseInt(globalCalcJpy || '0').toLocaleString()}</div>
                                        <div className="h-px bg-gray-300 w-full mb-2"></div>
                                        <div className="flex justify-between items-end">
                                            <p className="font-bold text-gray-500 text-xs text-left mb-0.5">約合台幣 (x{JPY_RATE})</p>
                                            <p className="font-black text-2xl text-kuma-black text-right">NT$ {Math.round(parseInt(globalCalcJpy || '0')*JPY_RATE).toLocaleString()}</p>
                                        </div>
                                    </div>

                                    {/* ✅ 計算機按鈕：加入 666666 觸發上鎖邏輯 */}
                                    <div className="grid grid-cols-3 gap-2">
                                        {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => {
                                            const newVal = globalCalcJpy === '0' || !globalCalcJpy ? n.toString() : globalCalcJpy + n;
                                            setGlobalCalcJpy(newVal);
                                            // 觸發彩蛋上鎖機制
                                            if (newVal === '666666') {
                                                saveSettings({ ...appSettings, isPinEnabled: true });
                                                setShowGlobalCalc(false);
                                                setGlobalCalcJpy('');
                                                setIsAuthenticated(false);
                                            }
                                        }} className="brutal-btn bg-white py-4 text-2xl">{n}</button>)}
                                        <button onClick={() => setGlobalCalcJpy('0')} className="brutal-btn bg-red-100 text-kuma-red py-4 text-2xl">C</button>
                                        <button onClick={() => {
                                            const newVal = globalCalcJpy === '0' || !globalCalcJpy ? '0' : globalCalcJpy + '0';
                                            setGlobalCalcJpy(newVal);
                                        }} className="brutal-btn bg-white py-4 text-2xl">0</button>
                                        <button onClick={() => setGlobalCalcJpy(globalCalcJpy.length > 1 ? globalCalcJpy.slice(0, -1) : '0')} className="brutal-btn bg-gray-200 py-4 flex justify-center items-center text-kuma-black"><Icon name="Backspace" size={28} /></button>
                                    </div>

                                    <button className="brutal-btn bg-kuma-black text-white w-full py-4 mt-4 text-lg font-black tracking-widest text-center shadow-hard" onClick={() => setShowGlobalCalc(false)}>完成並關閉</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
